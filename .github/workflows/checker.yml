name: VPN Checker

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Deps
        run: |
          pip install requests

      - name: Run VPN Checker
        run: python main.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Run TG Proxy Checker
        run: python tg_proxy_checker.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Commit & Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add checked/ checked_tg/
          git commit -m "Auto-update: $(date +%Y-%m-%d)" || echo "No changes"
          git push
