name: VPN Configs Checker

on:
  schedule:
    - cron: '0 */48 * * *'  # Запуск раз в 2 дня
  workflow_dispatch:        # Ручной запуск

# 👇 ВАЖНО: Явно даем права на запись
permissions:
  contents: write

jobs:
  check-vpn:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run VPN Checker
      run: python main.py
      env:
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}  # Если используете бота
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

    - name: Commit and push results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add checked/
        # Проверяем, есть ли изменения
        if ! git diff --staged --quiet; then
          git commit -m "🔄 Auto-update configs: $(date '+%Y-%m-%d %H:%M')"
          git push
        else
          echo "✅ No changes detected, skipping commit."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
